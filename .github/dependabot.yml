version: 2
updates:
  # Keep the GitHub Actions used by our workflows current (+ security alerts).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Python dependencies in pyproject.toml. The `uv` ecosystem updates pyproject.toml AND relocks
  # uv.lock in the same PR, so the --frozen CI install stays green (unlike the plain pip ecosystem).
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps

  # The pinned uv builder image in the add-on Dockerfile (FROM ghcr.io/astral-sh/uv:<ver>). The HA
  # base image is passed via `ARG BUILD_FROM`, not a FROM literal, so Dependabot can't track it —
  # bump that one by hand in build.yaml (see CONTRIBUTING.md -> Dependencies).
  - package-ecosystem: docker
    directory: /addon
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
