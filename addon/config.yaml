name: "EnOcean MQTT for Home Assistant"
description: "EnOcean to MQTT bridge for Home Assistant (whole EEP range; first-class Eltako support)"
url: "https://github.com/t-ice/enocean-mqtt-ha"
slug: "enocean_mqtt_ha"
version: "1.0.4"
# Prebuilt per-arch images published by .github/workflows/release.yml on each tagged release.
# HA substitutes {arch}; installs pull the image instead of building the Dockerfile locally.
image: "ghcr.io/t-ice/{arch}-enocean-mqtt-ha"
init: false
uart: true
hassio_api: true
homeassistant_api: true
services:
  - "mqtt:want"
map:
  - "config:rw"
arch:
  - aarch64
  - amd64

options:
  device: ""
  tcp: ""
  device_file: "/config/enocean2mqtt/devices.yaml"
  log_file: "/config/enocean2mqtt/enocean2mqtt.log"
  log_level: info
  send_interval_ms: 100
  repeater: "off"

schema:
  # Local EnOcean USB stick as a serial path, e.g. /dev/ttyUSB0 or /dev/serial/by-id/… (for a stick
  # plugged into the HA machine). Leave empty when using TCP (ser2net) below. Plain text (not a
  # hardware dropdown) so it can be left blank — HA's device picker rejects an empty selection.
  device: "str?"
  # Remote transceiver over ser2net, as host:port (e.g. 192.168.10.31:3000). Use this for a stick on
  # a Raspberry Pi. If both are set, TCP wins. Set exactly one.
  tcp: "str?"
  device_file: "str"
  log_file: "str?"
  # error | warning | info (default) | debug. 'debug' also logs every raw telegram.
  log_level: "list(error|warning|info|debug)?"
  # Min ms between transmitted telegrams so command bursts aren't dropped (0 = off; default 100,
  # ~ the EnOcean ERP1 RX maturity time). Lower it (e.g. 50) only if your bursts are reliable.
  send_interval_ms: "int(0,2000)?"
  # Transceiver repeater: 'off' (default), or level '1'/'2' to re-broadcast telegrams for extra range.
  # Applied to the stick at startup; the current level shows as a diagnostic sensor.
  repeater: "list(off|1|2)?"
  # --- Advanced (optional) ---
  # Pre-shared key (32 hex chars) for decrypting PSK-protected secure teach-ins. Only needed for
  # devices that ship a PSK-encrypted teach-in; most secure teach-ins send the key in the clear.
  secure_psk: "password?"
  # Explicit MQTT broker; leave unset to auto-use the Supervisor 'mqtt' service.
  # (Flat optional keys — an all-optional nested dict is still 'required' by HA's schema.)
  mqtt_host: "str?"
  mqtt_port: "port?"
  mqtt_user: "str?"
  mqtt_pwd: "password?"
  # TLS to the broker (all optional; set mqtt_ssl true to enable). ca_certs/certfile/keyfile are
  # paths under /config or /ssl; mqtt_ssl_insecure skips certificate verification (testing only).
  mqtt_ssl: "bool?"
  mqtt_ssl_ca_certs: "str?"
  mqtt_ssl_certfile: "str?"
  mqtt_ssl_keyfile: "str?"
  mqtt_ssl_insecure: "bool?"
