# Machine-readable Eltako / EnOcean device catalog.
#
# Single source of truth for the catalog-consistency test (tests/test_catalog.py). Whether a
# device is actually MAPPED is computed from the code-defined MAPPING,
# not stored here (so the two never drift).
#
# verification tiers:
#   verified - present in the live fleet and/or confirmed from the captured telegram log
#   manual   - modelled from the datasheet / EEP spec, but not hardware-tested in this repo
#   generic  - standard EEP with no Eltako-specific quirks
#
# An entry has EITHER model_key (an Eltako actuator, keyed under MAPPING `eltako:`) OR eep
# (a standard EEP sensor declared by rorg/func/type). command_eep/status_eep document the EEPs
# an actuator uses to be commanded / to report state.

meta:
  note: >
    Series 14 bus actuators (FSR14, FSB14, FUD14, ...) sit behind an FGW14/FAM14 RS485 gateway;
    each channel is commanded from sender = base_id + offset. Wireless 61/71 devices are direct.
  sources:
    - "Eltako Serie 14 RS485-Bus manual"
    - "EnOcean Equipment Profiles (EEP) 2.6.7 / 3.1"

