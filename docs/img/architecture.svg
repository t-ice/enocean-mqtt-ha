<svg width="1660" height="420" viewBox="0 0 1660 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#16233d" flood-opacity="0.16"/>
    </filter>
    <marker id="arw" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8.5" markerHeight="8.5" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 z" fill="#7d8daa"/>
    </marker>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; fill: #14233d; }
      .title { font-size: 17px; font-weight: 600; }
      .titleB{ font-size: 18px; font-weight: 700; }
      .sub   { font-size: 12.5px; fill: #5a6b84; }
      .plabel{ font-size: 14px; font-weight: 600; fill: #4a5e7d; letter-spacing: .3px; }
      .elabel{ font-size: 12.5px; fill: #3a4a66; }
      .card  { stroke-width: 2; filter: url(#sh); }
      .hw    { fill: #fff1e0; stroke: #e08a3c; }
      .ext   { fill: #e4f5ec; stroke: #3e9d6a; }
      .core  { fill: #eaf2fe; stroke: #3b7de0; }
      .coreE { fill: #dbe9fe; stroke: #2f6fd6; stroke-width: 2.5; }
      .panel { fill: #f4f8fd; stroke: #d6e1f0; stroke-width: 1.5; }
      .link  { stroke: #7d8daa; stroke-width: 2; fill: none; }
      .dash  { stroke: #9aa8c0; stroke-width: 1.6; stroke-dasharray: 5 4; fill: none; }
    </style>
  </defs>

  <rect width="1660" height="420" fill="#ffffff"/>

  <!-- package container around the three in-process stages -->
  <rect class="panel" x="290" y="96" width="838" height="250" rx="20"/>
  <text class="plabel" x="312" y="126">enocean2mqtt  ·  single asyncio event loop</text>

  <!-- boxes -->
  <rect class="card hw"    x="30"   y="152" width="170" height="128" rx="14"/>
  <text class="title" x="115" y="210" text-anchor="middle">EnOcean</text>
  <text class="title" x="115" y="232" text-anchor="middle">USB stick</text>

  <rect class="card core"  x="310"  y="152" width="180" height="128" rx="14"/>
  <text class="title" x="400" y="205" text-anchor="middle">Transceiver</text>
  <text class="title" x="400" y="227" text-anchor="middle">adapter</text>
  <text class="sub"   x="400" y="250" text-anchor="middle">ESP3 frame I/O</text>

  <rect class="card coreE" x="600"  y="152" width="210" height="128" rx="14"/>
  <text class="titleB" x="705" y="200" text-anchor="middle">Application core</text>
  <text class="sub"    x="705" y="224" text-anchor="middle">daemon · decode / encode</text>
  <text class="sub"    x="705" y="244" text-anchor="middle">ESP3 + EEP engine</text>

  <rect class="card core"  x="920"  y="152" width="188" height="128" rx="14"/>
  <text class="title" x="1014" y="205" text-anchor="middle">HA bridge</text>
  <text class="sub"   x="1014" y="228" text-anchor="middle">discovery · mapping</text>
  <text class="sub"   x="1014" y="248" text-anchor="middle">MQTT adapter</text>

  <rect class="card ext"   x="1200" y="160" width="170" height="112" rx="14"/>
  <text class="title" x="1285" y="222" text-anchor="middle">MQTT broker</text>

  <rect class="card ext"   x="1450" y="160" width="180" height="112" rx="14"/>
  <text class="title" x="1540" y="222" text-anchor="middle">Home Assistant</text>

  <!-- connectors (all bidirectional) -->
  <line class="link" x1="200"  y1="216" x2="306"  y2="216" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text class="elabel" x="253" y="185" text-anchor="middle">serial /</text>
  <text class="elabel" x="253" y="204" text-anchor="middle">ser2net TCP</text>

  <line class="link" x1="490"  y1="216" x2="596"  y2="216" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text class="elabel" x="543" y="185" text-anchor="middle">ESP3</text>
  <text class="elabel" x="543" y="204" text-anchor="middle">frames</text>

  <line class="link" x1="810"  y1="216" x2="916"  y2="216" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text class="elabel" x="863" y="185" text-anchor="middle">decoded</text>
  <text class="elabel" x="863" y="204" text-anchor="middle">state / cmd</text>

  <line class="link" x1="1108" y1="216" x2="1196" y2="216" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text class="elabel" x="1152" y="185" text-anchor="middle">publish +</text>
  <text class="elabel" x="1152" y="204" text-anchor="middle">discovery</text>

  <line class="link" x1="1370" y1="216" x2="1446" y2="216" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text class="elabel" x="1408" y="197" text-anchor="middle">topics</text>

  <!-- flow-direction legend -->
  <text class="sub" x="835" y="378" text-anchor="middle">→ inbound: telegrams decoded &amp; published as HA state    ·    ← outbound: HA commands encoded &amp; sent as RF</text>
</svg>
